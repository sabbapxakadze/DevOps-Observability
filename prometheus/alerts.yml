groups:
  - name: app_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(app_errors_total[1m]) * 60 > 5
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Application error rate exceeded threshold"
          description: "Error rate is {{ $value | printf \"%.2f\" }} errors/min (threshold: 5 errors/min)"

      - alert: HighRequestRate
        expr: rate(app_requests_total[1m]) * 60 > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "WARNING: Unusually high request rate"
          description: "Request rate is {{ $value | printf \"%.2f\" }} req/min (threshold: 100 req/min)"

  - name: infrastructure_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Service {{ $labels.job }} is unreachable"
          description: "Prometheus cannot scrape {{ $labels.instance }} — service may be down or network unreachable"
