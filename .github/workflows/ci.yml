name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build and test
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: install dependencies
        working-directory: ./app
        run: npm install

      - name: check for dependency vulnerabilities
        working-directory: ./app
        run: npm audit --audit-level=high

      - name: lint code
        working-directory: ./app
        run: npm run lint

      - name: run tests
        working-directory: ./app
        run: npm test

  security:
    name: security scanning
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: lint dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      - name: validate docker and compose with checkov
        run: |
          pip install checkov --quiet
          checkov -f docker-compose.yml --soft-fail --compact
          checkov -f app/Dockerfile --soft-fail --compact

      - name: scan for hardcoded secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: scan filesystem for vulnerabilities with trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs ./app --severity HIGH,CRITICAL --exit-code 0 --format table
